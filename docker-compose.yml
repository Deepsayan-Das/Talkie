networks:
  talkie-net:
    driver: bridge
volumes:
  postgres-data:
  mongo-data:
  redis-data:
services:
  postgres:
    image: postgres:17
    container_name: postgres_c
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_HOST_AUTH_METHOD=md5
    networks:
      - talkie-net
    volumes:
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -h localhost -p 5432"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 10s
  mongoDB:
    image: mongo:7.0
    container_name: mongo_c
    networks:
      - talkie-net
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 10s
  redis:
    image: redis:7.2
    container_name: redis_c
    networks:
      - talkie-net
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 10s
      